type Global @entity {
  id: Bytes!
  in: [MatroidIn!]
  out: [MatroidOut!]
  totalStaked: BigInt
  rewardNotifiedTotal: BigInt
  stakerCount: Int
  stakers: [Staker!]
  epochs: [Epoch!]
  deposits: [TreasuryDeposit!]
  totalDeposited: BigInt
  targetTotal: BigInt
  targetDuration: BigInt
  claimWindow: BigInt
  distributionStart: BigInt
  totalDistributed: BigInt
  baseBudget: BigInt
  perProjectBudget: BigInt
  mona: Bytes
  registry: Bytes
  scorer: Bytes
  globalPool: Bytes
  slashingContract: Bytes
  projects: [Project!]
}

type BudgetProposal @entity {
  id: Bytes!
  proposalId: BigInt!
  baseBudget: BigInt!
  perProjectBudget: BigInt!
  newDuration: BigInt!
  endTime: BigInt!
  yesWeight: BigInt!
  noWeight: BigInt!
  executed: Boolean!
  passed: Boolean
  applied: Boolean
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BudgetVote @entity {
  id: Bytes!
  proposal: BudgetProposal!
  voter: Bytes!
  inFavor: Boolean!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type AnonBudgetProposal @entity {
  id: Bytes!
  proposalId: BigInt!
  baseBudget: BigInt!
  perProjectBudget: BigInt!
  newDuration: BigInt!
  end: BigInt!
  yes: BigInt!
  no: BigInt!
  executed: Boolean!
  passed: Boolean
  applied: Boolean
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Enrollment @entity(immutable: true) {
  id: Bytes!
  commitment: BigInt!
  leafIndex: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type _EnrollmentCounter @entity {
  id: ID!
  count: Int!
}

type BalanceLeaf @entity(immutable: true) {
  id: ID!
  balanceKey: BigInt!
  balance: BigInt!
  leafIndex: Int!
  root: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SponsorVault @entity {
  id: Bytes!
  totalPoints: BigInt!
  accRewardPerPoint: BigInt!
  totalDeposited: BigInt!
  totalRewards: BigInt!
  totalClaimed: BigInt!
  sponsorCount: Int!
  sponsors: [Sponsor!]! @derivedFrom(field: "vault")
}

type Sponsor @entity {
  id: Bytes!
  vault: SponsorVault!
  account: Bytes!
  points: BigInt!
  totalDeposited: BigInt!
  totalClaimed: BigInt!
  firstSeenTimestamp: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type TreasuryDeposit @entity {
  id: Bytes!
  from: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Epoch @entity {
  id: Bytes!
  epoch: BigInt! # uint256
  totalScore: BigInt! # uint256
  activeProjects: BigInt! # uint256
  projects: [Project!]
  budget: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MatroidIn @entity {
  id: Bytes!
  project: Bytes! # address
  user: Bytes! # address
  token: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MatroidOut @entity {
  id: Bytes!
  project: Bytes! # address
  user: Bytes! # address
  token: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Staker @entity {
  id: Bytes!
  pool: Global!
  user: Bytes!
  stakedAmount: BigInt!
  staked: [Staked!]
  unstaked: [Unstaked!]
}

type Staked @entity {
  id: Bytes!
  user: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Unstaked @entity {
  id: Bytes!
  user: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Project @entity {
  id: Bytes!
  metadata: ProjectMetadata
  registeredAt: BigInt
  erc20Pool: ProjectPoolERC20
  nftPool: ProjectPoolNFT
  globalSplitBps: Int
  projectErc20SplitBps: Int
  projectNftSplitBps: Int
  monaIn: [TokenFlow!]
  monaOut: [TokenFlow!]
  monaTxCount: BigInt
  monaUniqueUsers: BigInt
  claimableHistory: [Claimable!]
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  admins: [Bytes!]
}

type ProjectMetadata @entity {
  id: String!
  title: String
  image: String
  description: String
}

type TokenFlow @entity {
  id: Bytes!
  project: Project!
  user: Bytes!
  token: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  amount: BigInt!
}

type ProjectPoolERC20 @entity {
  id: Bytes!
  project: Project!
  totalStaked: BigInt!
  rewardNotifiedTotal: BigInt!
  rewardTokens: [Bytes!]
  claims: [PoolClaim!]
  stakerCount: Int!
  stakers: [ERC20Staker!]
}

type ProjectPoolNFT @entity {
  id: Bytes!
  project: Project!
  totalWeight: BigInt!
  whitelistCount: Int!
  whitelistedNfts: [WhitelistedNFT!]
  rewardNotifiedTotal: BigInt!
  rewardTokens: [Bytes!]
  claims: [PoolClaim!]
  stakerCount: Int!
  stakers: [NFTStaker!]
}

type ERC20Staker @entity {
  id: Bytes!
  pool: ProjectPoolERC20!
  user: Bytes!
  stakedAmount: BigInt!
}

type NFTStaker @entity {
  id: Bytes!
  pool: ProjectPoolNFT!
  user: Bytes!
  totalWeight: BigInt!
  tokenIds: [BigInt!]!
}

type Claimable @entity {
  id: Bytes!
