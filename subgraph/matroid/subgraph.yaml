specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MatroidRegistry
    network: anvil
    source:
      address: "0x29c6fF2E3D04a9f37e7af1fF9b38C9E2e9079FfA"
      abi: MatroidRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Project
        - ProjectPoolsCreated
        - TokenFlow
      abis:
        - name: MatroidRegistry
          file: ./abis/MatroidRegistry.json
        - name: ProjectStakingPool
          file: ./abis/ProjectStakingPool.json
        - name: ProjectNFTStakingPool
          file: ./abis/ProjectNFTStakingPool.json
      eventHandlers:
        - event: ClaimerUpdated(indexed address,indexed address,bool)
          handler: handleClaimerUpdated
        - event: FlowRecorded(indexed address,indexed address,indexed address,uint256,bool)
          handler: handleFlowRecorded
        - event: ProjectPoolsCreated(indexed address,address,address)
          handler: handleProjectPoolsCreated
        - event: ProjectRegistered(indexed address,string)
          handler: handleProjectRegistered
        - event: RewardSplitsUpdated(indexed address,uint16,uint16,uint16)
          handler: handleRewardSplitsUpdated
      file: ./src/matroid-registry.ts
  - kind: ethereum
    name: MatroidKit
    network: anvil
    source:
      address: "0xd4567AA4Fd1B32A16c16CBFF9D9a69e51CF72293"
      abi: MatroidKit
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MatroidIn
        - MatroidOut
        - MatroidKitProjectRegistered
      abis:
        - name: MatroidKit
          file: ./abis/MatroidKit.json
      eventHandlers:
        - event: MatroidIn(indexed address,indexed address,indexed address,uint256)
          handler: handleMatroidIn
        - event: MatroidOut(indexed address,indexed address,indexed address,uint256)
          handler: handleMatroidOut
        - event: ProjectRegistered(indexed address,string)
          handler: handleProjectRegistered
      file: ./src/matroid-kit.ts
  - kind: ethereum
    name: Treasury
    network: anvil
    source:
      address: "0xfC3c03385dA8D5Adfb8BDF5f5fe156fb5B3a6Ee2"
      abi: Treasury
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ClaimableCleared
        - ClaimableSet
        - TreasuryClaimed
        - DistributionStarted
        - EpochFinalized
        - FundsDeposited
        - ProjectSlash
        - SlashResolve
        - SlashRewardNotified
        - SlashingContractUpdated
        - TargetDurationUpdated
        - TargetReconciled
        - TargetUpdated
      abis:
        - name: Treasury
          file: ./abis/Treasury.json
      eventHandlers:
        - event: ClaimableCleared(indexed uint256,indexed address)
          handler: handleClaimableCleared
        - event: ClaimableSet(indexed uint256,indexed address,uint256)
          handler: handleClaimableSet
        - event: Claimed(indexed uint256,indexed address,indexed address,uint256)
          handler: handleClaimed
        - event: DistributionStarted(uint256)
          handler: handleDistributionStarted
        - event: EpochFinalized(indexed uint256,uint256,uint256,uint256)
          handler: handleEpochFinalized
        - event: FundsDeposited(indexed address,uint256)
          handler: handleFundsDeposited
        - event: ProjectSlashed(indexed uint256,indexed address,uint16,bool)
          handler: handleProjectSlashed
        - event: SlashResolved(indexed uint256,indexed address,uint256)
          handler: handleSlashResolved
        - event: SlashRewardNotified(indexed uint256,indexed address,uint256)
          handler: handleSlashRewardNotified
        - event: SlashingContractUpdated(indexed address,indexed address)
          handler: handleSlashingContractUpdated
        - event: TargetDurationUpdated(uint256,uint256)
          handler: handleTargetDurationUpdated
        - event: TargetReconciled(uint256,uint256)
          handler: handleTargetReconciled
        - event: TargetUpdated(uint256,uint256)
          handler: handleTargetUpdated
      file: ./src/treasury.ts
  - kind: ethereum
    name: SlashingCouncil
    network: anvil
    source:
      address: "0x1055780Bd25e2F698E7c9a95FBaf4cb565A23A14"
      abi: SlashingCouncil
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProposalExecuted
        - ProposalResolved
        - Voted
        - VoterRewardNotified
        - VoterRewarded
      abis:
        - name: SlashingCouncil
          file: ./abis/SlashingCouncil.json
      eventHandlers:
        - event: ProposalExecuted(indexed uint256,indexed address,uint16,bool)
          handler: handleProposalExecuted
        - event: ProposalResolved(indexed uint256,indexed address,bool)
          handler: handleProposalResolved
        - event: Voted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleVoted
        - event: VoterRewardNotified(indexed uint256,indexed address,uint256)
          handler: handleVoterRewardNotified
        - event: VoterRewarded(indexed uint256,indexed address,indexed address,uint256)
          handler: handleVoterRewarded
      file: ./src/slashing-council.ts
  - kind: ethereum
    name: GlobalStakingPool
    network: anvil
    source:
      address: "0x3ccA24e1A0e49654bc3482ab70199b7400eb7A3a"
      abi: GlobalStakingPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalClaimed
        - GlobalRewardNotified
        - Staked
        - Staker
        - Unstaked
      abis:
        - name: GlobalStakingPool
          file: ./abis/GlobalStakingPool.json
      eventHandlers:
        - event: Claimed(indexed address,uint256)
          handler: handleClaimed
        - event: RewardNotified(uint256)
          handler: handleRewardNotified
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
      file: ./src/global-staking-pool.ts
  - kind: ethereum
    name: MatroidAnonGovernance
    network: anvil
    source:
      address: "0xE015ADD43D2C41e8Af4e9238e389101884853896"
      abi: MatroidAnonGovernance
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AnonBudgetProposal
      abis:
        - name: MatroidAnonGovernance
          file: ./abis/MatroidAnonGovernance.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,uint256,uint256,uint256,uint64)
          handler: handleProposalCreated
        - event: Voted(indexed uint256,uint8,uint256)
          handler: handleVoted
        - event: Executed(indexed uint256,bool,bool)
          handler: handleExecuted
      file: ./src/matroid-anon-governance.ts
  - kind: ethereum
    name: IdentityRegistry
    network: anvil
    source:
      address: "0x22F4D93be0E8C0C081e74c0d5e697B64eEA007FF"
      abi: IdentityRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Enrollment
        - _EnrollmentCounter
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistry.json
      eventHandlers:
        - event: Enrolled(indexed uint256,bytes32)
          handler: handleEnrolled
      file: ./src/identity-registry.ts
  - kind: ethereum
    name: BalancePool
    network: anvil
    source:
      address: "0xEBf9D3ead9A8c2bb8cEa438B8Dfa9f1AFf44bfa7"
      abi: BalancePool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PoolEvent
      abis:
        - name: BalancePool
          file: ./abis/BalancePool.json
      eventHandlers:
        - event: Deposited(indexed uint8,bytes32,uint32,bytes32)
          handler: handleDeposited
        - event: Withdrawn(indexed uint8,uint32,bytes32)
          handler: handleWithdrawn
      file: ./src/balance-pool.ts
  - kind: ethereum
    name: SponsorVault
    network: anvil
    source:
      address: "0x1A2894885076934dAf5a398Ff216c6d665707bbA"
      abi: SponsorVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SponsorVault
        - Sponsor
      abis:
        - name: SponsorVault
          file: ./abis/SponsorVault.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: RewardAdded(uint256,uint256)
          handler: handleRewardAdded
        - event: Claimed(indexed address,uint256)
          handler: handleClaimed
      file: ./src/sponsor-vault.ts
templates:
  - name: ProjectStakingPool
    kind: ethereum/contract
    network: anvil
    source:
      abi: ProjectStakingPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/project-staking-pool.ts
      entities:
        - ProjectPoolERC20
        - ERC20Staker
      abis:
        - name: ProjectStakingPool
          file: ./abis/ProjectStakingPool.json
      eventHandlers:
        - event: RewardTokenAdded(indexed address)
          handler: handleRewardTokenAdded
        - event: RewardTokenRemoved(indexed address)
          handler: handleRewardTokenRemoved
        - event: RewardNotified(indexed address,uint256)
          handler: handleRewardNotified
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
        - event: Claimed(indexed address,indexed address,uint256)
          handler: handleClaimed
  - name: ProjectNFTStakingPool
    kind: ethereum/contract
    network: anvil
    source:
      abi: ProjectNFTStakingPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/project-nft-staking-pool.ts
      entities:
        - ProjectPoolNFT
        - NFTStaker
      abis:
        - name: ProjectNFTStakingPool
          file: ./abis/ProjectNFTStakingPool.json
      eventHandlers:
        - event: RewardTokenAdded(indexed address)
          handler: handleRewardTokenAdded
        - event: RewardTokenRemoved(indexed address)
          handler: handleRewardTokenRemoved
        - event: RewardNotified(indexed address,uint256)
          handler: handleRewardNotified
        - event: NftWhitelisted(indexed address,uint256)
          handler: handleNftWhitelisted
        - event: NftWeightUpdated(indexed address,uint256)
          handler: handleNftWeightUpdated
        - event: NftStaked(indexed address,indexed address,uint256,uint256)
          handler: handleNftStaked
        - event: NftUnstaked(indexed address,indexed address,uint256,uint256)
          handler: handleNftUnstaked
        - event: Claimed(indexed address,indexed address,uint256)
          handler: handleClaimed
  - name: ProjectMetadata
    kind: file/ipfs
    mapping:
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/ds-handlers.ts
      handler: handleMetadata
      entities:
        - ProjectMetadata
      abis:
        - name: ProjectStakingPool
          file: ./abis/ProjectStakingPool.json
