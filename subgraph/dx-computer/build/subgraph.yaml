specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: KitRegistry
    network: lens-testnet
    source:
      address: "0xd7b56771EAe28Dd2FEF53fcd40C7340bE263C3c2"
      abi: KitRegistry
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Kit
      abis:
        - name: KitRegistry
          file: KitRegistry/KitRegistry.json
      eventHandlers:
        - event: KitPublished(indexed uint256,indexed uint256,uint8,bytes32,bytes32,string)
          handler: handleKitPublished
        - event: KitVersioned(indexed uint256,bytes32,uint64,string)
          handler: handleKitVersioned
        - event: KitRemoved(indexed uint256)
          handler: handleKitRemoved
        - event: KitClaimed(indexed uint256,indexed address)
          handler: handleKitClaimed
      file: KitRegistry/KitRegistry.wasm
  - kind: ethereum
    name: GrantRegistry
    network: lens-testnet
    source:
      address: "0x3bc48FBFa49b9BcDdcC0cF5B79488115e3dE9A6e"
      abi: GrantRegistry
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Grant
        - GrantFunder
        - Treeliner
        - CreatorBan
      abis:
        - name: GrantRegistry
          file: GrantRegistry/GrantRegistry.json
      eventHandlers:
        - event: GrantCreated(indexed uint256,indexed uint256,indexed
            address,bytes32,string,uint256)
          handler: handleGrantCreated
        - event: GrantUpdated(indexed uint256,bytes32,string,uint256)
          handler: handleGrantUpdated
        - event: GrantFunded(indexed uint256,indexed address,uint256,uint256)
          handler: handleGrantFunded
        - event: GrantRemoved(indexed uint256)
          handler: handleGrantRemoved
        - event: Claimed(indexed uint256,indexed address,uint256)
          handler: handleClaimed
      file: GrantRegistry/GrantRegistry.wasm
  - kind: ethereum
    name: PrefabMarket
    network: lens-testnet
    source:
      address: "0xf6A6AEfd407C952F5216626337974863a7918bd1"
      abi: PrefabMarket
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Offer
        - OfferAgent
        - Order
      abis:
        - name: PrefabMarket
          file: PrefabMarket/PrefabMarket.json
      eventHandlers:
        - event: OfferCreated(indexed uint256,indexed
            address,uint256,uint64,bytes32,string,uint256,uint16,uint256,uint64)
          handler: handleOfferCreated
        - event: OfferUpdated(indexed uint256,uint256,uint16,uint256,string,uint64)
          handler: handleOfferUpdated
        - event: OfferDeleted(indexed uint256)
          handler: handleOfferDeleted
        - event: GrantLinked(indexed uint256,indexed uint256,uint16)
          handler: handleGrantLinked
        - event: GrantUnlinked(indexed uint256)
          handler: handleGrantUnlinked
        - event: AgentLinked(indexed uint256,indexed uint256)
          handler: handleAgentLinked
        - event: AgentUnlinked(indexed uint256,indexed uint256)
          handler: handleAgentUnlinked
        - event: CyberSwagSet(indexed uint256,uint16)
          handler: handleCyberSwagSet
        - event: OrderPlaced(indexed uint256,indexed uint256,indexed
            address,uint256,address,bytes32,bytes)
          handler: handleOrderPlaced
        - event: OrderSlices(indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderSlices
        - event: OrderReleased(indexed uint256,bool)
          handler: handleOrderReleased
        - event: OrderRefunded(indexed uint256)
          handler: handleOrderRefunded
        - event: OrderStageSet(indexed uint256,uint8,uint64)
          handler: handleOrderStageSet
      file: PrefabMarket/PrefabMarket.wasm
  - kind: ethereum
    name: ContentRegistry
    network: lens-testnet
    source:
      address: "0x5a9FF14C57ef46B06aC621F62F7A0896945351b9"
      abi: ContentRegistry
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Content
      abis:
        - name: ContentRegistry
          file: ContentRegistry/ContentRegistry.json
      eventHandlers:
        - event: Posted(indexed uint256,address,bytes32,bytes32,bytes32,bytes32,string)
          handler: handlePosted
        - event: Updated(indexed uint256,bytes32,uint64,bool)
          handler: handleUpdated
      file: ContentRegistry/ContentRegistry.wasm
  - kind: ethereum
    name: CyberswagmanRegistry
    network: lens-testnet
    source:
      address: "0x2c42613874dbE533F3fafE90b7Ee41898D1318A8"
      abi: CyberswagmanRegistry
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
        - AgentKit
        - AgentResult
      abis:
        - name: CyberswagmanRegistry
          file: CyberswagmanRegistry/CyberswagmanRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address,bytes32,bytes32,string)
          handler: handleAgentRegistered
        - event: AgentUpdated(indexed uint256,bytes32,bytes32,string)
          handler: handleAgentUpdated
        - event: SchemaChanged(indexed uint256,indexed uint256,bool)
          handler: handleSchemaChanged
        - event: ResultPosted(indexed uint256,indexed uint256,bytes32,string)
          handler: handleResultPosted
        - event: AgentDeleted(indexed uint256)
          handler: handleAgentDeleted
      file: CyberswagmanRegistry/CyberswagmanRegistry.wasm
  - kind: ethereum
    name: DxCouncil
    network: lens-testnet
    source:
      address: "0xA468711BACe058139b9ac3A062bff5393124d6b1"
      abi: DxCouncil
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CouncilProposal
      abis:
        - name: DxCouncil
          file: DxCouncil/DxCouncil.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,uint8,indexed address,bool,uint256,uint64,string)
          handler: handleProposalCreated
        - event: Voted(indexed uint256,uint8,bytes32)
          handler: handleVoted
        - event: Executed(indexed uint256,uint8,indexed address)
          handler: handleExecuted
      file: DxCouncil/DxCouncil.wasm
  - kind: ethereum
    name: IdentityRegistry
    network: lens-testnet
    source:
      address: "0x7990e98504AcD43681cdfFb975Aa75472836855e"
      abi: IdentityRegistry
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Enrollment
        - _EnrollmentCounter
      abis:
        - name: IdentityRegistry
          file: IdentityRegistry/IdentityRegistry.json
      eventHandlers:
        - event: Enrolled(indexed uint256,bytes32,uint32,bytes32)
          handler: handleEnrolled
      file: IdentityRegistry/IdentityRegistry.wasm
  - kind: ethereum
    name: BalancePool
    network: lens-testnet
    source:
      address: "0xad579354c49492F6B8A5843147E45ff03B9Da1F5"
      abi: BalancePool
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PoolEvent
      abis:
        - name: BalancePool
          file: BalancePool/BalancePool.json
      eventHandlers:
        - event: Deposited(indexed uint8,bytes32,uint32,bytes32)
          handler: handleDeposited
        - event: Withdrawn(indexed uint8,uint32,bytes32)
          handler: handleWithdrawn
      file: BalancePool/BalancePool.wasm
  - kind: ethereum
    name: Blacklist
    network: lens-testnet
    source:
      address: "0x734Dff80e53D3A8f509E62481CeDD3a85649b5c8"
      abi: Blacklist
      startBlock: 4457000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CreatorBan
      abis:
        - name: Blacklist
          file: Blacklist/Blacklist.json
      eventHandlers:
        - event: Banned(indexed address,bool,indexed address)
          handler: handleBanned
      file: Blacklist/Blacklist.wasm
