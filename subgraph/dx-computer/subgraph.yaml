specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: KitRegistry
    network: anvil
    source:
      address: "0xA1B809005E589f81dE6EF9F48D67e35606c05fC3"
      abi: KitRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Kit
      abis:
        - name: KitRegistry
          file: ./abis/KitRegistry.json
      eventHandlers:
        - event: KitPublished(indexed uint256,indexed uint256,uint8,bytes32,bytes32,string)
          handler: handleKitPublished
        - event: KitVersioned(indexed uint256,bytes32,uint64,string)
          handler: handleKitVersioned
        - event: KitRemoved(indexed uint256)
          handler: handleKitRemoved
        - event: KitClaimed(indexed uint256,indexed address)
          handler: handleKitClaimed
      file: ./src/kit-registry.ts
  - kind: ethereum
    name: GrantRegistry
    network: anvil
    source:
      address: "0xc0431C32561DabE0c8FD791B52590BbBA413c235"
      abi: GrantRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Grant
        - GrantFunder
        - Treeliner
        - CreatorBan
      abis:
        - name: GrantRegistry
          file: ./abis/GrantRegistry.json
      eventHandlers:
        - event: GrantCreated(indexed uint256,indexed uint256,indexed address,bytes32,string,uint256)
          handler: handleGrantCreated
        - event: GrantUpdated(indexed uint256,bytes32,string,uint256)
          handler: handleGrantUpdated
        - event: GrantFunded(indexed uint256,indexed address,uint256,uint256)
          handler: handleGrantFunded
        - event: GrantRemoved(indexed uint256)
          handler: handleGrantRemoved
        - event: Claimed(indexed uint256,indexed address,uint256)
          handler: handleClaimed
      file: ./src/grant-registry.ts
  - kind: ethereum
    name: PrefabMarket
    network: anvil
    source:
      address: "0xD49036D56f474152891D9eced770D6b90B2cEAE9"
      abi: PrefabMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Offer
        - OfferAgent
        - Order
      abis:
        - name: PrefabMarket
          file: ./abis/PrefabMarket.json
      eventHandlers:
        - event: OfferCreated(indexed uint256,indexed address,uint256,uint64,bytes32,string,uint256,uint16,uint256,uint64)
          handler: handleOfferCreated
        - event: OfferUpdated(indexed uint256,uint256,uint16,uint256,string,uint64)
          handler: handleOfferUpdated
        - event: OfferDeleted(indexed uint256)
          handler: handleOfferDeleted
        - event: GrantLinked(indexed uint256,indexed uint256,uint16)
          handler: handleGrantLinked
        - event: GrantUnlinked(indexed uint256)
          handler: handleGrantUnlinked
        - event: AgentLinked(indexed uint256,indexed uint256)
          handler: handleAgentLinked
        - event: AgentUnlinked(indexed uint256,indexed uint256)
          handler: handleAgentUnlinked
        - event: CyberSwagSet(indexed uint256,uint16)
          handler: handleCyberSwagSet
        - event: OrderPlaced(indexed uint256,indexed uint256,indexed address,uint256,address,bytes32,bytes)
          handler: handleOrderPlaced
        - event: OrderSlices(indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderSlices
        - event: OrderReleased(indexed uint256,bool)
          handler: handleOrderReleased
        - event: OrderRefunded(indexed uint256)
          handler: handleOrderRefunded
        - event: OrderStageSet(indexed uint256,uint8,uint64)
          handler: handleOrderStageSet
      file: ./src/prefab-market.ts
  - kind: ethereum
    name: ContentRegistry
    network: anvil
    source:
      address: "0xb1Ca5B44ef3627A3E5Ed7a6EE877D9D997A7c7ED"
      abi: ContentRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Content
      abis:
        - name: ContentRegistry
          file: ./abis/ContentRegistry.json
      eventHandlers:
        - event: Posted(indexed uint256,address,bytes32,bytes32,bytes32,bytes32,string)
          handler: handlePosted
        - event: Updated(indexed uint256,bytes32,uint64,bool)
          handler: handleUpdated
      file: ./src/content-registry.ts
  - kind: ethereum
    name: CyberswagmanRegistry
    network: anvil
    source:
      address: "0x996462e0eAf00bF6BF0Ea15F29d715C0eD3906F1"
      abi: CyberswagmanRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
        - AgentKit
        - AgentResult
      abis:
        - name: CyberswagmanRegistry
          file: ./abis/CyberswagmanRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address,bytes32,bytes32,string)
          handler: handleAgentRegistered
        - event: AgentUpdated(indexed uint256,bytes32,bytes32,string)
          handler: handleAgentUpdated
        - event: SchemaChanged(indexed uint256,indexed uint256,bool)
          handler: handleSchemaChanged
        - event: ResultPosted(indexed uint256,indexed uint256,bytes32,string)
          handler: handleResultPosted
        - event: AgentDeleted(indexed uint256)
          handler: handleAgentDeleted
      file: ./src/cyberswagman-registry.ts
  - kind: ethereum
    name: DxCouncil
    network: anvil
    source:
      address: "0xf43624d811c5DC9eF91cF237ab9B8eE220D438eE"
      abi: DxCouncil
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CouncilProposal
      abis:
        - name: DxCouncil
          file: ./abis/DxCouncil.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,uint8,indexed address,bool,uint256,uint64,string)
          handler: handleProposalCreated
        - event: Voted(indexed uint256,uint8,uint256)
          handler: handleVoted
        - event: Executed(indexed uint256,uint8,indexed address)
          handler: handleExecuted
      file: ./src/dx-council.ts
  - kind: ethereum
    name: IdentityRegistry
    network: anvil
    source:
      address: "0x22F4D93be0E8C0C081e74c0d5e697B64eEA007FF"
      abi: IdentityRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Enrollment
        - _EnrollmentCounter
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistry.json
      eventHandlers:
        - event: Enrolled(indexed uint256,bytes32)
          handler: handleEnrolled
      file: ./src/identity-registry.ts
  - kind: ethereum
    name: BalancePool
    network: anvil
    source:
      address: "0x23ceE3FB585b1e5092b7CFB222e8e873B05E9519"
      abi: BalancePool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PoolEvent
      abis:
        - name: BalancePool
          file: ./abis/BalancePool.json
      eventHandlers:
        - event: Deposited(indexed uint8,bytes32,uint32,bytes32)
          handler: handleDeposited
        - event: Withdrawn(indexed uint8,uint32,bytes32)
          handler: handleWithdrawn
      file: ./src/balance-pool.ts
  - kind: ethereum
    name: Blacklist
    network: anvil
    source:
      address: "0xe4C7fBB0a626ed208021ccabA6Be1566905E2dFc"
      abi: Blacklist
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CreatorBan
      abis:
        - name: Blacklist
          file: ./abis/Blacklist.json
      eventHandlers:
        - event: Banned(indexed address,bool,indexed address)
          handler: handleBanned
      file: ./src/blacklist.ts
