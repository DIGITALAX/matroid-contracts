type Game @entity {
  id: ID!
  gameId: BigInt!
  ownerTag: Bytes!
  scorer: Bytes!
  uri: String!
  version: BigInt!
  publishedAt: BigInt!
  removed: Boolean!
  removedByAdmin: Boolean!
  erased: Boolean!
  banned: Boolean!
  versions: [GameVersion!]! @derivedFrom(field: "game")
  flows: [Flow!]! @derivedFrom(field: "game")
  epochs: [GameEpoch!]! @derivedFrom(field: "game")
}

type GameVersion @entity(immutable: true) {
  id: ID!
  game: Game!
  scorer: Bytes!
  version: BigInt!
  uri: String!
  timestamp: BigInt!
}

type Flow @entity(immutable: true) {
  id: ID!
  game: Game!
  isIn: Boolean!
  wallet: Bytes!
  amount: BigInt!
  destination: Bytes
  epoch: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type GameEpoch @entity {
  id: ID!
  game: Game!
  epoch: BigInt!
  volumeIn: BigInt!
  volumeOut: BigInt!
  flowCount: BigInt!
  potFunded: BigInt!
  totalPoints: BigInt!
  playerCount: BigInt!
  potClaimed: Boolean!
  potClaimAmount: BigInt!
}

type ScoreSubmission @entity(immutable: true) {
  id: ID!
  game: Game!
  epoch: BigInt!
  playerKey: Bytes!
  points: BigInt!
  anonymous: Boolean!
  timestamp: BigInt!
}

type PlayerEpochGame @entity {
  id: ID!
  epoch: BigInt!
  game: Game!
  playerKey: Bytes!
  points: BigInt!
}

type PlayerEpoch @entity {
  id: ID!
  epoch: BigInt!
  playerKey: Bytes!
  gameIds: [String!]!
  playerEpochGameIds: [String!]!
  erased: Boolean!
  claimed: Boolean!
  claimPayout: Bytes
  claimAmount: BigInt!
}

type Pot @entity {
  id: ID!
  epoch: BigInt!
  funded: BigInt!
  playerClaimed: BigInt!
  gameClaimed: BigInt!
  rolledOut: BigInt!
  rolledIn: BigInt!
}

type PotClaim @entity(immutable: true) {
  id: ID!
  epoch: BigInt!
  kind: String!
  playerKey: Bytes
  game: Game
  payout: Bytes!
  amount: BigInt!
  timestamp: BigInt!
}

type Proposal @entity {
  id: ID!
  proposalId: BigInt!
  kind: Int!
  target: BigInt!
  tagTarget: Bytes!
  value: BigInt!
  uri: String!
  yes: BigInt!
  no: BigInt!
  start: BigInt!
  end: BigInt!
  executed: Boolean!
  passed: Boolean!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

type Vote @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  nullifier: Bytes!
  support: Boolean!
  timestamp: BigInt!
}

type GameBan @entity {
  id: ID!
  gameId: BigInt!
  banned: Boolean!
  by: Bytes!
  timestamp: BigInt!
}

type TagBan @entity {
  id: ID!
  ownerTag: Bytes!
  banned: Boolean!
  by: Bytes!
  timestamp: BigInt!
}

type BlacklistSetter @entity {
  id: ID!
  setter: Bytes!
  allowed: Boolean!
}

type PaymasterTarget @entity {
  id: ID!
  target: Bytes!
  gameId: BigInt!
  core: Boolean!
  active: Boolean!
  cap: BigInt!
}

type SponsoredCall @entity(immutable: true) {
  id: ID!
  target: Bytes!
  from: Bytes!
  fee: BigInt!
  epoch: BigInt!
  timestamp: BigInt!
}

type GandaConfig @entity {
  id: ID!
  metadata: String!
  globalBps: Int!
  projectBps: Int!
  nftBps: Int!
  potBps: Int!
  gamesPotBps: Int!
  claimWindowEpochs: BigInt!
  score: Bytes
  paymaster: Bytes
  paymasterDefaultCap: BigInt!
}
